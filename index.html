<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House Estética</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: white;
      line-height: 1.6;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: auto;
    }

    header {
      min-height: 100vh;
      display: flex;
      align-items: center;
      background: linear-gradient(to bottom right, #1a1a1a, #000);
      padding: 60px 0;
    }

    .hero {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 50px;
      align-items: center;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    h1 span {
      color: #d4af37;
    }

    .subtitle {
      color: #ccc;
      font-size: 1.2rem;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .btn {
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.3s;
      display: inline-block;
    }

    .btn-gold {
      background: #d4af37;
      color: black;
    }

    .btn-outline {
      border: 2px solid #d4af37;
      color: #d4af37;
    }

    .placeholder {
      background: #111;
      border: 1px solid #333;
      border-radius: 20px;
      min-height: 350px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      color: #888;
    }

    section {
      padding: 100px 0;
    }

    .section-title {
      text-align: center;
      margin-bottom: 50px;
    }

    .section-title h2 {
      font-size: 2.8rem;
      margin-bottom: 15px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 30px;
    }

    .card h3 {
      color: #d4af37;
      margin-bottom: 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .gallery-item {
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #777;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .contact-box {
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
    }

    .contact-box h3 {
      color: #d4af37;
      margin-bottom: 10px;
    }

    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid #111;
      color: #666;
    }
  </style>
</head>

<body>

<header>
  <div class="container hero">
    <div>
      <h1>House <span>Estética</span></h1>

      <p class="subtitle">
        Atendimento no conforto da sua casa com qualidade, cuidado e acabamento premium para o seu veículo.
      </p>

      <div class="buttons">
        <a href="https://wa.me/5599999999999" class="btn btn-gold">
          Agendar pelo WhatsApp
        </a>
      </div>
    </div>

    <div class="placeholder">
      Área para foto principal do veículo ou atendimento.
    </div>
  </div>
</header>

<footer>
  © 2026 House Estética
</footer>

</body>
</html>
